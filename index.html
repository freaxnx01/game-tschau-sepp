document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

          <\u002Fsc-if>\n\n          <sc-if value=\"{{ mpConnecting }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size: 18px; color: #4a3416; margin: 28px 0 12px; font-style: italic; text-align: center;\">Verbinde…<\u002Fdiv>\n          <\u002Fsc-if>\n\n          <div style=\"text-align: center; margin-top: 20px;\">\n            <button onclick=\"{{ closeMp }}\" style=\"font-family: inherit; font-size: 16px; font-weight: 700; color: #4a3416; background: #fdf8ea; border: 2px solid #b8923a; border-radius: 10px; padding: 8px 26px; cursor: pointer;\" style-hover=\"filter: brightness(0.95);\">Zrugg<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ================= WISH MODAL ================= -->\n    <sc-if value=\"{{ showWish }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Farbwunsch\" style=\"position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(15,20,12,0.45); z-index: 60;\">\n        <div style=\"background: linear-gradient(180deg, #f6efdc, #ede1c2); border: 3px solid #b8923a; box-shadow: 0 0 0 6px #3a2818, 0 20px 50px rgba(0,0,0,0.6); border-radius: 20px; padding: 30px 40px; text-align: center; animation: popIn 0.3s;\">\n          <div style=\"font-size: 28px; font-weight: 900; color: #7c1f26;\">Under gspielt!<\u002Fdiv>\n          <div style=\"font-size: 18px; color: #4a3416; margin: 6px 0 20px;\">Wünsch dir e Farb:<\u002Fdiv>\n          <div style=\"display: flex; gap: 16px;\">\n            <sc-for list=\"{{ wishOptions }}\" as=\"w\" hint-placeholder-count=\"0\">\n              <button onclick=\"{{ w.pick }}\" style=\"display: flex; flex-direction: column; align-items: center; gap: 8px; font-family: inherit; background: #fdf8ea; border: 2px solid #b8923a; border-radius: 14px; padding: 16px 20px; cursor: pointer; box-shadow: 0 3px 8px rgba(0,0,0,0.2);\" style-hover=\"transform: translateY(-4px); box-shadow: 0 8px 16px rgba(0,0,0,0.3); border-color: #7c1f26;\">\n                <div style=\"width: 58px; height: 58px; background-image: url({{ w.uri }}); background-size: contain; background-repeat: no-repeat;\"><\u002Fdiv>\n                <span style=\"font-size: 16px; font-weight: 700; color: #4a3416;\">{{ w.name }}<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ================= ROUND END ================= -->\n    <sc-if value=\"{{ showRoundEnd }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Rundenendi\" style=\"position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(15,20,12,0.5); z-index: 60;\">\n        <div style=\"background: linear-gradient(180deg, #f6efdc, #ede1c2); border: 3px solid #b8923a; box-shadow: 0 0 0 6px #3a2818, 0 20px 50px rgba(0,0,0,0.6); border-radius: 20px; padding: 38px 54px; text-align: center; max-width: 480px; animation: popIn 0.35s;\">\n          <div style=\"font-size: 40px; font-weight: 900; color: {{ roundEndColor }}; line-height: 1.15;\">{{ roundEndTitle }}<\u002Fdiv>\n          <div style=\"font-size: 22px; font-weight: 700; color: #4a3416; margin-top: 14px;\">{{ roundEndPts }}<\u002Fdiv>\n          <div style=\"font-size: 17px; color: #6b5636; margin-top: 6px;\">{{ roundEndScore }}<\u002Fdiv>\n          <div style=\"display: flex; gap: 14px; justify-content: center; margin-top: 26px;\">\n            <button onclick=\"{{ nextRoundClick }}\" style=\"font-family: inherit; font-size: 19px; font-weight: 800; color: #f6efd9; background: linear-gradient(180deg, #4c8a5c, #31694a); border: 2px solid #1e4230; border-radius: 12px; padding: 12px 30px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.35);\" style-hover=\"filter: brightness(1.12);\">Nöchsti Rundä<\u002Fbutton>\n            <button onclick=\"{{ toMenu }}\" style=\"font-family: inherit; font-size: 19px; font-weight: 700; color: #4a3416; background: #fdf8ea; border: 2px solid #b8923a; border-radius: 12px; padding: 12px 30px; cursor: pointer;\" style-hover=\"filter: brightness(0.95);\">Neus Spiel<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ================= RULES ================= -->\n    <sc-if value=\"{{ showRules }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Regle\" style=\"position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(15,20,12,0.5); z-index: 70;\">\n        <div style=\"background: linear-gradient(180deg, #f6efdc, #ede1c2); border: 3px solid #b8923a; box-shadow: 0 0 0 6px #3a2818, 0 20px 50px rgba(0,0,0,0.6); border-radius: 20px; padding: 34px 44px; max-width: 620px; animation: popIn 0.3s;\">\n          <div style=\"font-size: 32px; font-weight: 900; color: #7c1f26; text-align: center;\">So gohts: Tschau Sepp<\u002Fdiv>\n          <div style=\"font-size: 17px; color: #3d3018; line-height: 1.65; margin-top: 16px;\">\n            <div style=\"display: flex; gap: 10px; margin-bottom: 8px;\"><span style=\"font-weight: 900; color: #b8923a;\">♦<\u002Fspan><span>Spiel e Charte mit <b>glicher Farb<\u002Fb> oder <b>glichem Wärt<\u002Fb> wie di oberschti Charte. Susch muesch <b>ei Charte zieh<\u002Fb> — wenn die passt, dörfsch se grad spiele.<\u002Fspan><\u002Fdiv>\n            <div style=\"display: flex; gap: 10px; margin-bottom: 8px;\"><span style=\"font-weight: 900; color: #b8923a;\">7<\u002Fspan><span>Dr Gägner muess <b>2 Charte zieh<\u002Fb> — oder er <b>stackt<\u002Fb> sälber e Siebni druf: denn sinds 4, 6, 8 Charte…<\u002Fspan><\u002Fdiv>\n            <div style=\"display: flex; gap: 10px; margin-bottom: 8px;\"><span style=\"font-weight: 900; color: #b8923a;\">8<\u002Fspan><span>Dr Gägner wird <b>übersprunge<\u002Fb> — du dörfsch grad nomol. Mit ere Achti chasch <b>nöd fertig mache<\u002Fb>: du muesch nomol — und wenns nöd goht, zieh.<\u002Fspan><\u002Fdiv>\n            <div style=\"display: flex; gap: 10px; margin-bottom: 8px;\"><span style=\"font-weight: 900; color: #b8923a;\">U<\u002Fspan><span>Dr <b>Under<\u002Fb> isch dr Joker — dörf immer gspielt wärde, und du <b>wünschisch dir e Farb<\u002Fb>.<\u002Fspan><\u002Fdiv>\n            <div style=\"display: flex; gap: 10px; margin-bottom: 8px;\"><span style=\"font-weight: 900; color: #b8923a;\">A<\u002Fspan><span>S'<b>Ass<\u002Fb> muess <b>«deckt»<\u002Fb> wärde: grad no en Ass oder e Charte vo dr <b>gliche Farb<\u002Fb> obedruf. Chasch nöd decke, muesch <b>zieh, bis es goht<\u002Fb>. Mit eme blutte Ass chasch nöd fertig mache.<\u002Fspan><\u002Fdiv>\n            <div style=\"display: flex; gap: 10px; margin-bottom: 8px;\"><span style=\"font-weight: 900; color: #b8923a;\">!<\u002Fspan><span>Bi dr <b>letschte Charte<\u002Fb> muesch vorhär <b>«Tschau!»<\u002Fb> säge (Chnopf drucke) — susch gits 2 Strofcharte. Mit dr letschte Charte heissts denn <b>«Sepp!»<\u002Fb>.<\u002Fspan><\u002Fdiv>\n            <div style=\"display: flex; gap: 10px;\"><span style=\"font-weight: 900; color: #b8923a;\">★<\u002Fspan><span>Wär gwünnt, überchunnt d Pünkt vo de Gägnercharte: <b>Ass 11 · Banner 10 · Künig 4 · Ober 3 · Under 2<\u002Fb>.<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"text-align: center; margin-top: 22px;\">\n            <button onclick=\"{{ closeRules }}\" style=\"font-family: inherit; font-size: 18px; font-weight: 800; color: #f6efd9; background: linear-gradient(180deg, #8a5f38, #6b4426); border: 2px solid #3a2512; border-radius: 12px; padding: 10px 34px; cursor: pointer;\" style-hover=\"filter: brightness(1.12);\">Verstande!<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;tischfarbe&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#31694a&quot;, &quot;options&quot;: [&quot;#31694a&quot;, &quot;#27516b&quot;, &quot;#6d2a33&quot;, &quot;#3d3d52&quot;], &quot;section&quot;: &quot;Tisch&quot;}, &quot;kartegroessi&quot;: {&quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 1, &quot;min&quot;: 0.8, &quot;max&quot;: 1.3, &quot;step&quot;: 0.05, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Charte&quot;}, &quot;startcharte&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;5&quot;, &quot;options&quot;: [&quot;5&quot;, &quot;7&quot;], &quot;section&quot;: &quot;Charte&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    phase: 'menu', // menu | play | wish | roundEnd\n    mode: 'bot', // bot | host | guest\n    difficulty: 'gwieft',\n    player: [], bot: [], pile: [], discard: [],\n    turn: 'du', wish: null, wisher: null,\n    message: '', bubble: null, bubbleW: null,\n    saidDu: false, saidComp: false,\n    hasDrawn: false, drawnId: null, cover: null, pending7: 0,\n    scores: { du: 0, comp: 0 }, rounds: { du: 0, comp: 0 }, roundNum: 1,\n    sound: true, rules: false, tip: null, hintId: null,\n    roundEnd: null, starter: 'du',\n    mp: null, // {stage, myCode, label, error, copied}\n  };\n  tk = 0;\n  caches = {};\n  sndSeq = 0;\n\n  // sync any host state change to the guest (debounced)\n  setState(p, cb) { super.setState(p, () => { this.queuePush(); cb && cb(); }); }\n  queuePush() {\n    if (this.state.mode !== 'host') return;\n    if (this._pt) return;\n    this._pt = setTimeout(() => { this._pt = null; this.pushState(); }, 30);\n  }\n\n  // ---------- Deck ----------\n  shuffleArr(a) {\n    a = a.slice();\n    for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }\n    return a;\n  }\n  buildDeck() {\n    const d = []; let id = 0;\n    for (const s of ['rose', 'schilte', 'eichle', 'schaelle'])\n      for (const r of ['6', '7', '8', '9', 'B', 'U', 'O', 'K', 'A'])\n        d.push({ id: id++, suit: s, rank: r });\n    return this.shuffleArr(d);\n  }\n  suitName(s) { return { rose: 'Rose', schilte: 'Schilte', eichle: 'Eichle', schaelle: 'Schälle' }[s]; }\n  rankName(r) { return { '6': 'Sächsi', '7': 'Siebni', '8': 'Achti', '9': 'Nüni', 'B': 'Banner', 'U': 'Under', 'O': 'Ober', 'K': 'Künig', 'A': 'Ass' }[r]; }\n  cardName(c) { return 'dr ' + this.suitName(c.suit) + '-' + this.rankName(c.rank); }\n  pointsOf(hand) { const P = { A: 11, B: 10, K: 4, O: 3, U: 2 }; return hand.reduce((a, c) => a + (P[c.rank] || 0), 0); }\n  OPP() { return this.state.mode === 'bot' ? 'Dr Computer' : 'Din Kolleg'; }\n\n  // ---------- Messages (perspective-aware for multiplayer) ----------\n  msgText(w, k, x, flip) {\n    const mine = flip ? w === 'comp' : w === 'du';\n    const O = this.OPP();\n    switch (k) {\n      case 'start': return mine ? 'Du bisch dra.' : O + ' fot a…';\n      case 'bareAce': return mine ? 'Mit eme blutte Ass chasch nöd fertig mache — zieh zum Decke!' : O + ' cha mit em Ass nöd fertig mache — er zieht.';\n      case 'coverDrawn': return mine ? ('Du hesch ' + x + ' Charte zoge — jetzt deck s Ass!') : (O + ' zieht ' + x + ' Charte und deckt.');\n      case 'coverPrompt': return mine ? 'Ass! Du muesch decke: no en Ass, glichi Farb oder en Under — susch zieh, bis es goht.' : ('Ass! ' + O + ' muess decke.');\n      case 'eightLast': return mine ? 'Mit ere Achti chasch nöd fertig mache — du bisch nomol dra und muesch zieh!' : (O + ' cha mit dr Achti nöd fertig mache — er zieht.');\n      case 'again': return mine ? 'Du bisch nomol dra.' : (O + ' isch nomol dra.');\n      case 'sepp': return mine ? 'SEPP!' : '';\n      case 'forgot': return mine ? '«Tschau» vergässe! 2 Strofcharte für di.' : (O + ' het «Tschau» vergässe — 2 Strofcharte!');\n      case 'wishPrompt': return mine ? 'Wünsch dir e Farb!' : (O + ' wünscht sich grad e Farb…');\n      case 'wished': return mine ? ('Du wünschisch dir ' + this.suitName(x) + '.') : (O + ' wünscht sich ' + this.suitName(x) + '.');\n      case 'eightAgain': return mine ? 'Achti! Du dörfsch grad nomol.' : ('Achti! ' + O + ' dörf nomol.');\n      case 'seven': return mine ? ('Siebni! Zieh ' + x + ' Charte — oder stack sälber e Siebni!') : ('Siebni! ' + O + ' muess ' + x + ' Charte zieh — oder stacke.');\n      case 'turn': return mine ? (x ? ('Du bisch dra — Wunsch: ' + this.suitName(x) + '.') : 'Du bisch dra.') : (O + ' studiert…');\n      case 'coverFail': return mine ? 'Kei Charte meh zum Zieh — s Ass blibt blutt.' : (O + ' cha s Ass nöd decke — kei Charte meh.');\n      case 'noCards': return mine ? 'Kei Charte meh zum Zieh!' : (O + ' cha nüme zieh.');\n      case 'drewPlayable': return mine ? 'Du chasch e passendi Charte spiele — oder passe.' : (O + ' zieht e Charte.');\n      case 'drewStuck': return mine ? 'Nüt Spielbars…' : (O + ' zieht e Charte.');\n      case 'drewN': return mine ? ('Du ziehsch ' + x + ' Charte.') : (O + ' zieht ' + (x > 1 ? x + ' Charte.' : 'e Charte.'));\n      case 'tschau': return mine ? 'Tschau!' : (O + ' seit «Tschau!»');\n      default: return '';\n    }\n  }\n  M(w, k, x) { this.lastM = { w, k, x }; return this.msgText(w, k, x, false); }\n\n  // ---------- Suit artwork (100x100 viewBox fragments) ----------\n  suitArt(suit) {\n    if (this.caches['art_' + suit]) return this.caches['art_' + suit];\n    let g = '';\n    if (suit === 'rose') {\n      let petals = '';\n      for (let i = 0; i < 8; i++) petals += '<ellipse cx=\"50\" cy=\"23\" rx=\"12.5\" ry=\"19\" fill=\"url(#rg)\" transform=\"rotate(' + (i * 45 + 22.5) + ' 50 50)\"/>';\n      g = '<defs><radialGradient id=\"rg\" cx=\"50%\" cy=\"30%\" r=\"80%\"><stop offset=\"0%\" stop-color=\"#e0524a\"/><stop offset=\"100%\" stop-color=\"#9c141d\"/><\u002FradialGradient><\u002Fdefs>' +\n        '<g stroke=\"#5f0d12\" stroke-width=\"2.5\" stroke-linejoin=\"round\">' + petals +\n        '<circle cx=\"50\" cy=\"50\" r=\"15\" fill=\"#f0c243\"/><circle cx=\"50\" cy=\"50\" r=\"6.5\" fill=\"#9c141d\"/><\u002Fg>';\n    } else if (suit === 'schilte') {\n      const SH = 'M50 6 C62 12 76 14 90 11 L90 52 C90 75 72 90 50 97 C28 90 10 75 10 52 L10 11 C24 14 38 12 50 6 Z';\n      g = '<defs><linearGradient id=\"sg\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0\" stop-color=\"#42424a\"/><stop offset=\"1\" stop-color=\"#131316\"/><\u002FlinearGradient><clipPath id=\"sc\"><path d=\"' + SH + '\"/><\u002FclipPath><\u002Fdefs>' +\n        '<path d=\"' + SH + '\" fill=\"url(#sg)\"/>' +\n        '<g clip-path=\"url(#sc)\"><rect x=\"0\" y=\"0\" width=\"100\" height=\"34\" fill=\"#c22a2a\"/><rect x=\"0\" y=\"34\" width=\"100\" height=\"4\" fill=\"#e8b83c\"/><\u002Fg>' +\n        '<path d=\"' + SH + '\" fill=\"none\" stroke=\"#0c0c0e\" stroke-width=\"3.5\" stroke-linejoin=\"round\"/>';\n    } else if (suit === 'eichle') {\n      g = '<defs><linearGradient id=\"eg\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"0\"><stop offset=\"0\" stop-color=\"#e3c14f\"/><stop offset=\"0.5\" stop-color=\"#bb8d26\"/><stop offset=\"1\" stop-color=\"#7d5a14\"/><\u002FlinearGradient><\u002Fdefs>' +\n        '<path d=\"M47 12 Q49 4 57 5 Q53 10 54 17 Z\" fill=\"#4a3410\"/>' +\n        '<path d=\"M30 44 Q50 56 70 44 C70 68 62 85 50 91 C38 85 30 68 30 44 Z\" fill=\"url(#eg)\" stroke=\"#4a3410\" stroke-width=\"2.5\"/>' +\n        '<path d=\"M38 54 Q40 71 46 80\" stroke=\"#f4e09a\" stroke-width=\"3\" fill=\"none\" stroke-linecap=\"round\" opacity=\"0.8\"/>' +\n        '<path d=\"M24 43 Q50 13 76 43 Q64 52 50 52 Q36 52 24 43 Z\" fill=\"#6d4a16\" stroke=\"#3c290b\" stroke-width=\"2.5\" stroke-linejoin=\"round\"/>' +\n        '<path d=\"M31 37 L42 45 M40 31 L53 41 M50 27 L63 37 M60 30 L70 39\" stroke=\"#3c290b\" stroke-width=\"1.6\"/>';\n    } else {\n      g = '<defs><radialGradient id=\"bg\" cx=\"38%\" cy=\"30%\" r=\"80%\"><stop offset=\"0\" stop-color=\"#f8de74\"/><stop offset=\"0.6\" stop-color=\"#d9a92c\"/><stop offset=\"1\" stop-color=\"#8a660f\"/><\u002FradialGradient><\u002Fdefs>' +\n        '<path d=\"M50 3 C57 3 61 8 61 13 C61 18 57 22 50 22 C43 22 39 18 39 13 C39 8 43 3 50 3 Z\" fill=\"none\" stroke=\"#6b4e0c\" stroke-width=\"5\"/>' +\n        '<circle cx=\"50\" cy=\"58\" r=\"37\" fill=\"url(#bg)\" stroke=\"#6b4e0c\" stroke-width=\"2.5\"/>' +\n        '<circle cx=\"40\" cy=\"47\" r=\"4\" fill=\"#6b4e0c\"/><circle cx=\"60\" cy=\"47\" r=\"4\" fill=\"#6b4e0c\"/>' +\n        '<path d=\"M16 61 Q50 74 84 61\" stroke=\"#6b4e0c\" stroke-width=\"5\" fill=\"none\" stroke-linecap=\"round\"/>' +\n        '<circle cx=\"50\" cy=\"66\" r=\"6.5\" fill=\"#6b4e0c\"/>';\n    }\n    this.caches['art_' + suit] = g;\n    return g;\n  }\n  svgUri(w, h, inner) {\n    const e = encodeURIComponent('<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 ' + w + ' ' + h + '\">' + inner + '<\u002Fsvg>')\n      .replace(/\\(/g, '%28').replace(/\\)/g, '%29').replace(/'/g, '%27');\n    return 'data:image/svg+xml,' + e; // kei Semikolon — dr Inline-Style-Parser trennt bi ';'\n  }\n  suitUri(suit) {\n    const k = 'suit_' + suit;\n    if (!this.caches[k]) this.caches[k] = this.svgUri(100, 100, this.suitArt(suit));\n    return this.caches[k];\n  }\n  sym(suit, x, y, s) {\n    return '<g transform=\"translate(' + (x - s / 2) + ' ' + (y - s / 2) + ') scale(' + (s / 100) + ')\">' + this.suitArt(suit) + '<\u002Fg>';\n  }\n\n  // ---------- Card faces ----------\n  face(card) {\n    const k = 'face_' + card.suit + card.rank;\n    if (this.caches[k]) return this.caches[k];\n    const col = { rose: '#9c141d', schilte: '#17171a', eichle: '#5d431a', schaelle: '#8a6710' }[card.suit];\n    const lbl = { B: '10', U: 'U', O: 'O', K: 'K', A: 'A' }[card.rank] || card.rank;\n    let s = '<rect x=\"4\" y=\"4\" width=\"232\" height=\"352\" rx=\"18\" fill=\"#f7f0dc\" stroke=\"#2a2118\" stroke-width=\"3\"/>' +\n      '<rect x=\"13\" y=\"13\" width=\"214\" height=\"334\" rx=\"12\" fill=\"none\" stroke=\"#c8a14b\" stroke-width=\"2\"/>';\n    const corner = '<text x=\"31\" y=\"47\" font-size=\"36\" font-weight=\"700\" font-family=\"Vollkorn, Georgia, serif\" text-anchor=\"middle\" fill=\"' + col + '\">' + lbl + '<\u002Ftext>' + this.sym(card.suit, 31, 73, 27);\n    s += '<g>' + corner + '<\u002Fg><g transform=\"rotate(180 120 180)\">' + corner + '<\u002Fg>';\n    const PIPS = {\n      '6': [[80, 104], [160, 104], [80, 180], [160, 180], [80, 256], [160, 256]],\n      '7': [[80, 104], [160, 104], [80, 180], [160, 180], [80, 256], [160, 256], [120, 142]],\n      '8': [[80, 98], [160, 98], [80, 153], [160, 153], [80, 208], [160, 208], [80, 263], [160, 263]],\n      '9': [[80, 98], [160, 98], [80, 153], [160, 153], [80, 208], [160, 208], [80, 263], [160, 263], [120, 180]],\n    };\n    if (PIPS[card.rank]) {\n      for (const [x, y] of PIPS[card.rank]) s += this.sym(card.suit, x, y, 44);\n    } else if (card.rank === 'B') {\n      s += '<rect x=\"112\" y=\"76\" width=\"7\" height=\"212\" rx=\"3\" fill=\"#7d5a2a\" stroke=\"#4a3410\" stroke-width=\"1.5\"/>' +\n        '<circle cx=\"115.5\" cy=\"72\" r=\"7\" fill=\"#c8a14b\" stroke=\"#4a3410\" stroke-width=\"1.5\"/>' +\n        '<path d=\"M121 84 H196 L182 136 L196 188 H121 Z\" fill=\"#c22a2a\" stroke=\"#4a1010\" stroke-width=\"2.5\" stroke-linejoin=\"round\"/>' +\n        this.sym(card.suit, 152, 136, 46) +\n        '<text x=\"120\" y=\"322\" font-size=\"24\" font-style=\"italic\" font-weight=\"600\" font-family=\"Vollkorn, Georgia, serif\" text-anchor=\"middle\" fill=\"' + col + '\">Banner<\u002Ftext>';\n    } else if (card.rank === 'U' || card.rank === 'O' || card.rank === 'K') {\n      const name = { U: 'UNDER', O: 'OBER', K: 'KÜNIG' }[card.rank];\n      s += '<circle cx=\"120\" cy=\"150\" r=\"60\" fill=\"#fdf8ea\" stroke=\"#c8a14b\" stroke-width=\"3\"/>' +\n        '<circle cx=\"120\" cy=\"150\" r=\"52\" fill=\"none\" stroke=\"' + col + '\" stroke-width=\"1.5\"/>' +\n        this.sym(card.suit, 120, 150, 68);\n      if (card.rank === 'K') s += '<path d=\"M96 84 L102 70 L111 80 L120 66 L129  10px 22px rgba(0,0,0,0.5)' : '0 4px 12px rgba(0,0,0,0.4)'),\n        dim: (!myTurn || ok) ? 1 : 0.78,\n        cursor: ok ? 'pointer' : 'default',\n        play: () => this.tryPlay(c.id),\n      };\n    });\n\n    const botCards = s.bot.map((c, i) => {\n      const n = s.bot.length, off = i - (n - 1) / 2;\n      const sp = Math.min(36, 480 / Math.max(n - 1, 1));\n      const tx = Math.round(off * sp - bW / 2);\n      return {\n        tf: 'translateX(' + tx + 'px) translateY(' + Math.round(Math.pow(Math.abs(off), 1.6) * 2) + 'px) rotate(' + (-off * 2.5).toFixed(1) + 'deg)',\n        delay: (i * 0.07).toFixed(2) + 's',\n      };\n    });\n\n    const discards = s.discard.slice(-3).map((c, i) => ({\n      uri: this.face(c),\n      rot: ((c.id * 37) % 19) - 9,\n    }));\n\n    const pileStack = s.pile.slice(0, Math.min(3, s.pile.length)).map((_, i) => ({ x: -i * 2, y: -i * 2 }));\n\n    const suits = ['rose', 'schilte', 'eichle', 'schaelle'];\n    const re = s.roundEnd;\n    const mp = s.mp || null;\n    const oppShort = s.mode === 'bot' ? 'Computer' : 'Kolleg';\n\n    return {\n      // phases\n      isMenu: s.phase === 'menu',\n      started: s.phase !== 'menu',\n      showWish: s.phase === 'wish' && (s.wisher || 'du') === 'du',\n      showRoundEnd: s.phase === 'roundEnd' && !!re,\n      showRules: s.rules,\n      // multiplayer lobby\n      showMp: s.phase === 'menu' && !!mp,\n      mpChoose: !!mp && mp.stage === 'choose',\n      mpBusy: !!mp && mp.stage === 'busy',\n      mpHostCode: !!mp && mp.stage === 'host-code',\n      mpJoinPaste: !!mp && mp.stage === 'join-paste',\n      mpJoinCode: !!mp && mp.stage === 'join-code',\n      mpConnecting: !!mp && mp.stage === 'connecting',\n      mpError: (mp && mp.error) || '',\n      mpLabel: (mp && mp.label) || '',\n      mpMyCode: (mp && mp.myCode) || '',\n      copyLabel: mp && mp.copied ? 'Kopiert!' : 'Code kopiere',\n      openMp: () => this.setState({ mp: { stage: 'choose' } }),\n      closeMp: () => this.closeMpPanel(),\n      mpHostClick: () => this.mpHost(),\n      mpJoinPick: () => { this.peerCode = ''; this.setState({ mp: { stage: 'join-paste' } }); },\n      mpJoinGo: () => this.mpJoin(),\n      mpConnectGo: () => this.mpConnect(),\n      copyCode: () => this.copyCode(),\n      setPeer: (e) => { this.peerCode = e.target.value; },\n      // table\n      feltBg: 'radial-gradient(ellipse at 50% 32%, ' + felt + ', color-mix(in oklab, ' + felt + ', black 48%))',\n      cardW: W, cardH: H, botW: bW, handH: H + 46,\n      botLabelY: Math.round(bW * 1.5) + 12,\n      pileTop: (() => {\n        const feltH = Math.max(vh - 92, 320);\n        const botBottom = 22 + Math.round(bW * 1.5) + 42; // bot cards + label\n        const handTop = feltH - (H + 60);\n        return Math.round(Math.max((botBottom + handTop) / 2, botBottom + H / 2 + 44));\n      })(),\n      msgTop: (() => {\n        const feltH = Math.max(vh - 92, 320);\n        const botBottom = 22 + Math.round(bW * 1.5) + 42;\n        const handTop = feltH - (H + 60);\n        const pileTop = Math.round(Math.max((botBottom + handTop) / 2, botBottom + H / 2 + 44));\n        return Math.max(botBottom - 4, pileTop - Math.round(H / 2) - 42);\n      })(),\n      passeTop: (() => {\n        const feltH = Math.max(vh - 92, 320);\n        const botBottom = 22 + Math.round(bW * 1.5) + 42;\n        const handTop = feltH - (H + 60);\n        const pileTop = Math.round(Math.max((botBottom + handTop) / 2, botBottom + H / 2 + 44));\n        return pileTop + Math.round(H / 2) + 40;\n      })(),\n      pileGap: Math.round(W * 0.85 + 90),\n      chipLeft: Math.round(W / 2 + 76),\n      tschauBottom: H + 76,\n      backUri: this.backUri(),\n      // top bar\n      oppLabel: oppShort,\n      scoreDu: s.scores.du, scoreComp: s.scores.comp,\n      roundLine: 'Rundä ' + s.roundNum + ' · Gwunne ' + s.rounds.du + ':' + s.rounds.comp,\n      duDot: myTurn ? gold : 'rgba(255,255,255,0.15)',\n      compDot: (s.phase === 'play' && s.turn === 'comp') ? gold : 'rgba(255,255,255,0.15)',\n      soundLabel: s.sound ? '♪ Ton: ii' : '♪ Ton: us',\n      // game\n      message: s.message,\n      botCount: s.bot.length,\n      drawCount: s.pile.length,\n      drawCursor: (myTurn && !s.hasDrawn) ? 'pointer' : 'default',\n      playerCards, botCards, discards, pileStack,\n      showBubble: !!s.bubble && s.bubbleW !== 'du',\n      bubbleText: s.bubble,\n      showWishChip: !!s.wish && (s.phase === 'play' || s.phase === 'wish'),\n      wishUri: s.wish ? this.suitUri(s.wish) : '',\n      wishName: s.wish ? this.suitName(s.wish) : '',\n      showTschau: s.phase === 'play' && s.player.length === 1 && !s.saidDu,\n      showHint: myTurn,\n      hintClick: () => this.hintClick(),\n      showTip: !!s.tip && s.phase === 'play',\n      tipText: s.tip,\n      dismissTip: () => this.setState({ tip: null }),\n      tipBottom: H + 84,\n      showPasse: myTurn && s.hasDrawn && !s.cover,\n      // menus\n      menuSuits: suits.map(x => ({ uri: this.suitUri(x), name: this.suitName(x) })),\n      wishOptions: suits.map(x => ({ uri: this.suitUri(x), name: this.suitName(x), pick: () => this.pickWish(x) })),\n      roundEndTitle: re ? (re.winner === 'du' ? 'Sepp! Du hesch d Rundä gwunne!' : (this.OPP() + ' het gwunne.')) : '',\n      roundEndColor: re && re.winner === 'du' ? '#31694a' : '#7c1f26',\n      roundEndPts: re ? ('+' + re.pts + ' Pünkt ' + (re.winner === 'du' ? 'für di' : (s.mode === 'bot' ? 'für dr Computer' : 'für din Kolleg'))) : '',\n      roundEndScore: 'Stand: Du ' + s.scores.du + ' — ' + oppShort + ' ' + s.scores.comp,\n      // handlers\n      startEasy: () => this.start('gmuetlich'),\n      startSmart: () => this.start('gwieft'),\n      toMenu: () => this.toMenu(),\n      nextRoundClick: () => { if (this.state.mode === 'guest') this.send({ t: 'next' }); else this.nextRound(); },\n      drawClick: () => this.drawClick(),\n      passTurn: () => this.passTurn(),\n      sayTschau: () => this.sayTschau(),\n      openRules: () => this.setState({ rules: true }),\n      closeRules: () => this.setState({ rules: false }),\n      toggleSound: () => this.setState({ sound: !this.state.sound }),\n    };\n  }\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
